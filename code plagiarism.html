<!DOCTYPE html>
<html>
<head>
<title>Code Plagiarism Checker</title>

<style>

*{
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
}

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#1e3c72,#2a5298);
}

.container{
width:600px;
background:white;
padding:40px;
border-radius:15px;
box-shadow:0 15px 40px rgba(0,0,0,0.3);
text-align:center;
}

h1{
margin-bottom:5px;
}

.subtitle{
color:gray;
margin-bottom:30px;
}

.upload-box{
border:2px dashed #ccc;
padding:25px;
border-radius:10px;
margin-bottom:15px;
transition:0.3s;
}

.upload-box:hover{
border-color:#2a5298;
background:#f7f9ff;
}

button{
margin-top:20px;
padding:12px 30px;
font-size:16px;
border:none;
border-radius:6px;
background:#2a5298;
color:white;
cursor:pointer;
}

button:hover{
background:#1e3c72;
}

.progress{
width:100%;
height:15px;
background:#eee;
border-radius:20px;
margin-top:25px;
overflow:hidden;
}

.progress-bar{
height:100%;
width:0%;
background:linear-gradient(90deg,#00c6ff,#0072ff);
transition:width 1s;
}

.result{
margin-top:20px;
font-size:20px;
font-weight:bold;
}

.badge{
display:inline-block;
padding:6px 12px;
border-radius:20px;
color:white;
margin-left:10px;
font-size:14px;
}

.low{background:#2ecc71;}
.medium{background:#f39c12;}
.high{background:#e74c3c;}

.footer{
margin-top:25px;
font-size:12px;
color:gray;
}

</style>
</head>

<body>

<div class="container">

<h1>Code Plagiarism Checker</h1>
<div class="subtitle">Upload two files to compare similarity</div>

<div class="upload-box">
<input type="file" id="file1">
</div>

<div class="upload-box">
<input type="file" id="file2">
</div>

<button onclick="compareFiles()">Compare Code</button>

<div class="progress">
<div class="progress-bar" id="progressBar"></div>
</div>

<div class="result" id="result"></div>

<div class="footer">
Mini Project – Code Plagiarism Detection System
</div>

</div>

<script>

function preprocess(code){
return code
.replace(/\/\/.*$/gm,"")
.replace(/\/\*[\s\S]*?\*\//g,"")
.replace(/\s+/g," ")
.trim()
.toLowerCase();
}

function lcs(a,b){

let m=a.length;
let n=b.length;

let dp=new Array(m+1);

for(let i=0;i<=m;i++){
dp[i]=new Array(n+1).fill(0);
}

for(let i=1;i<=m;i++){
for(let j=1;j<=n;j++){

if(a[i-1]==b[j-1])
dp[i][j]=dp[i-1][j-1]+1;
else
dp[i][j]=Math.max(dp[i-1][j],dp[i][j-1]);

}
}

return dp[m][n];

}

function getLanguage(fileName){

const ext=fileName.split('.').pop().toLowerCase();

const supported={
"java":"Java",
"py":"Python",
"cpp":"C++",
"c":"C",
"js":"JavaScript",
"ts":"TypeScript",
"cs":"C#",
"go":"Go"
};

return supported[ext] || null;

}

function compareFiles(){

let file1=document.getElementById("file1").files[0];
let file2=document.getElementById("file2").files[0];

if(!file1||!file2){
alert("Please upload both files");
return;
}

const lang1=getLanguage(file1.name);
const lang2=getLanguage(file2.name);

if(!lang1||!lang2){
alert("Unsupported programming language");
return;
}

if(lang1!==lang2){
alert("Both files must be in the same programming language");
return;
}

let reader1=new FileReader();
let reader2=new FileReader();

reader1.onload=function(e1){

reader2.onload=function(e2){

let code1=preprocess(e1.target.result);
let code2=preprocess(e2.target.result);

let length=lcs(code1,code2);

let similarity=(2*length/(code1.length+code2.length))*100;

let bar=document.getElementById("progressBar");
bar.style.width=similarity+"%";

let level="Low";
let className="low";

if(similarity>70){
level="High";
className="high";
}
else if(similarity>30){
level="Medium";
className="medium";
}

document.getElementById("result").innerHTML=
`Similarity: ${similarity.toFixed(2)}%
<span class="badge ${className}">${level}</span>`;

};

reader2.readAsText(file2);
};

reader1.readAsText(file1);

}

</script>

</body>
</html>
